{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>User Profile</h2>
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">{{ user.name }}</h5>
            <p class="card-text"><strong>Email:</strong> {{ user.email }}</p>
            <p class="card-text"><strong>Department:</strong> {{ user.department }}</p>
            <p class="card-text"><strong>Work Title:</strong> {{ user.work_title }}</p>
            <p class="card-text"><strong>Role:</strong> {{ user.role|capitalize }}</p>
        </div>
    </div>
</div>
{% endblock %}
