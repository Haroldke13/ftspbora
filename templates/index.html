{% extends "base.html" %}
{% block content %}
<form method="POST" style="max-width: 400px; margin: 2rem auto; padding: 2rem; background: #f9f9f9; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
    <div style="margin-bottom: 1rem;">
        <label for="organization_name" style="font-weight: bold;">Organization Name</label><br>
        <input id="organization_name" name="organization_name" required style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
    </div>

    <div style="margin-bottom: 1rem;">
        <label for="service_requested" style="font-weight: bold;">Service Requested</label><br>
        <input id="service_requested" name="service_requested" required style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;">
    </div>

    <div style="margin-bottom: 1rem;">
        <label for="remarks" style="font-weight: bold;">Remarks</label><br>
        <textarea id="remarks" name="remarks" rows="3" style="width: 100%; padding: 0.5rem; border: 1px solid #ccc; border-radius: 4px;"></textarea>
    </div>

    <button type="submit" style="padding: 0.7rem 1.5rem; background: #007bff; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
        Continue
    </button>
</form>
{% endblock %}
