version: "3.9"

services:
  web:
    build: .
    container_name: flask_app
    command: gunicorn app:app --bind 0.0.0.0:10000 --timeout 120
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONUNBUFFERED: 1
    volumes:
      - .:/app
    restart: unless-stopped
